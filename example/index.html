<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>ZH & Projekt Countdown</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>🔥 Procrastination Exciter 3000</h1>
        
        <div class="timer-grid">
            <div class="card" data-deadline="2026-05-15T10:00:00">
                <h2>Programozás ZH</h2>
                <div class="countdown">
                    <span class="days">00</span> nap 
                    <span class="hours">00</span>:
                    <span class="minutes">00</span>:
                    <span class="seconds">00</span>
                </div>
                <p class="status">Még van időd... vagy mégsem?</p>
            </div>

            <div class="card" data-deadline="2026-04-20T23:59:00">
                <h2>Webes Projekt Beadandó</h2>
                <div class="countdown">
                    <span class="days">00</span> nap 
                    <span class="hours">00</span>:
                    <span class="minutes">00</span>:
                    <span class="seconds">00</span>
                </div>
                <p class="status">Ketyeg az óra!</p>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
